< !DOCTYPE html >
    <html lang="en">
        <head>
            <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>NEXUS - Premium Electronics</title>
                    <script src="https://cdn.tailwindcss.com"></script>
                    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
                    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
                    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap');

                        * {margin: 0; padding: 0; box-sizing: border-box; }

                        :root {
                            --primary: #0A0A0A;
                        --accent: #00FFD1;
                        --accent-2: #FF3366;
                        --text: #E5E5E5;
                        --border: rgba(255, 255, 255, 0.1);
        }

                        body {
                            font - family: 'Archivo', sans-serif;
                        background: var(--primary);
                        color: var(--text);
                        overflow-x: hidden; 
        }

                        .font-mono {font - family: 'Space Mono', monospace; }

                        /* Grain Overlay */
                        .grain-overlay {
                            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                        pointer-events: none; opacity: 0.03; z-index: 100;
                        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' /%3E%3C/svg%3E");
        }

                        /* Scroll Progress */
                        .scroll-progress {
                            position: fixed; top: 0; left: 0; height: 3px;
                        background: linear-gradient(90deg, var(--accent), var(--accent-2));
                        z-index: 9999; transform-origin: left;
        }

                        /* Navbar */
                        .navbar-blur {backdrop - filter: blur(12px); background: rgba(10, 10, 10, 0.9); }

                        /* Animations */
                        @keyframes glitch {
                            0 %, 100 % { transform: translate(0); }
            20% {transform: translate(-2px, 2px); }
                        40% {transform: translate(-2px, -2px); }
                        60% {transform: translate(2px, 2px); }
                        80% {transform: translate(2px, -2px); }
        }
                        .glitch:hover {animation: glitch 0.3s infinite; }

                        @keyframes pulse {0 %, 100 % { opacity: 1; } 50% {opacity: 0.5; } }
                        .badge-pulse {animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

                        @keyframes float {0 %, 100 % { transform: translateY(0px); } 50% {transform: translateY(-20px); } }
                        .floating {animation: float 6s ease-in-out infinite; }

                        @keyframes shimmer {
                            0 % { background- position: -1000px 0; }
                        100% {background - position: 1000px 0; }
        }
                        .shimmer {
                            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
                        background-size: 1000px 100%;
                        animation: shimmer 2s infinite;
        }

                        @keyframes marquee {0 % { transform: translateX(0); } 100% {transform: translateX(-50%); } }
                        .marquee {animation: marquee 30s linear infinite; }

                        /* Category Card Hover Effects */
                        .category-card {
                            position: relative;
                        overflow: hidden;
                        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

                        .category-card::before {
                            content: '';
                        position: absolute;
                        top: 0;
                        left: -100%;
                        width: 100%;
                        height: 100%;
                        background: linear-gradient(90deg, transparent, rgba(0, 255, 209, 0.1), transparent);
                        transition: left 0.6s ease;
        }

                        .category-card:hover::before {
                            left: 100%;
        }

                        .category-card:hover {
                            transform: translateY(-12px) scale(1.02);
                        box-shadow: 0 20px 60px rgba(0, 255, 209, 0.3);
        }

                        .category-image {
                            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

                        .category-card:hover .category-image {
                            transform: scale(1.1) rotate(2deg);
        }

                        /* Product Card */
                        .product-card {
                            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

                        .product-card:hover {
                            transform: translateY(-8px);
        }

                        .product-image {
                            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

                        .product-card:hover .product-image {
                            transform: scale(1.08);
        }

                        /* Buttons */
                        .btn-primary {
                            background: linear-gradient(135deg, var(--accent), #00D4AA);
                        color: var(--primary);
                        font-weight: 700;
                        transition: all 0.3s ease;
                        position: relative;
                        overflow: hidden;
        }

                        .btn-primary::before {
                            content: '';
                        position: absolute;
                        top: 0;
                        left: -100%;
                        width: 100%;
                        height: 100%;
                        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
                        transition: left 0.5s ease;
        }

                        .btn-primary:hover::before {
                            left: 100%;
        }

                        .btn-outline {
                            border: 2px solid var(--accent);
                        color: var(--accent);
                        background: transparent;
                        font-weight: 600;
                        transition: all 0.3s ease;
        }

                        .btn-outline:hover {
                            background: var(--accent);
                        color: var(--primary);
                        transform: scale(1.05);
        }

                        /* Modal */
                        .modal-backdrop {
                            backdrop - filter: blur(8px);
                        background: rgba(0, 0, 0, 0.7);
        }

                        /* Scrollbar */
                        .hide-scrollbar::-webkit-scrollbar {display: none; }
                        .hide-scrollbar {-ms - overflow - style: none; scrollbar-width: none; }

                        /* Checkmark Animation */
                        @keyframes checkmark {0 % { stroke- dashoffset: 100; } 100% {stroke - dashoffset: 0; } }
                        .checkmark {stroke - dasharray: 100; stroke-dashoffset: 100; animation: checkmark 0.6s ease-out forwards; }

                        /* Focus States */
                        input:focus, textarea:focus, select:focus {
                            outline: none;
                        border-color: var(--accent);
        }

                        /* Page Transition */
                        .page-enter {
                            opacity: 0;
                        transform: translateY(20px);
        }

                        .page-enter-active {
                            opacity: 1;
                        transform: translateY(0);
                        transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

                        /* Reveal on Scroll */
                        .reveal {
                            opacity: 0;
                        transform: translateY(40px);
        }

                        .reveal.active {
                            opacity: 1;
                        transform: translateY(0);
                        transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
                    </style>
                </head>
                <body>
                    <div class="grain-overlay"></div>
                    <div class="scroll-progress" id="scrollProgress"></div>
                    <div id="root"></div>

                    <script type="text/babel">
                        const {useState, useEffect, useRef, createContext, useContext} = React;

                        // Store Context
                        const StoreContext = createContext();
        const useStore = () => useContext(StoreContext);

                        // Category Data
                        const CATEGORIES = [
                        {
                            id: 'headphones',
                        name: 'Headphones',
                        image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&h=600&fit=crop',
                        description: 'Premium wireless audio',
                        count: 3,
                        gradient: 'from-cyan-500 to-blue-500'
            },
                        {
                            id: 'earbuds',
                        name: 'Earbuds',
                        image: 'https://images.unsplash.com/photo-1572569511254-d8f925fe2cbb?w=800&h=600&fit=crop',
                        description: 'True wireless freedom',
                        count: 3,
                        gradient: 'from-purple-500 to-pink-500'
            },
                        {
                            id: 'laptops',
                        name: 'Laptops',
                        image: 'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=800&h=600&fit=crop',
                        description: 'Power meets portability',
                        count: 3,
                        gradient: 'from-orange-500 to-red-500'
            },
                        {
                            id: 'mice',
                        name: 'Gaming Mice',
                        image: 'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=800&h=600&fit=crop',
                        description: 'Precision gaming gear',
                        count: 3,
                        gradient: 'from-green-500 to-emerald-500'
            }
                        ];

                        // Products Data
                        const PRODUCTS_DATA = [
                        {id:1,name:'AeroMesh Pro',category:'headphones',price:299,image:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600',description:'Premium wireless headphones with spatial audio and ANC',stock:15,featured:true},
                        {id:2,name:'SonicWave Elite',category:'headphones',price:349,image:'https://images.unsplash.com/photo-1545127398-14699f92334b?w=600',description:'Studio-grade over-ear headphones',stock:12,featured:false},
                        {id:3,name:'BassMaster Pro',category:'headphones',price:279,image:'https://images.unsplash.com/photo-1484704849700-f032a568e944?w=600',description:'Deep bass wireless headphones',stock:20,featured:false},
                        {id:4,name:'Infinity Buds',category:'earbuds',price:149,image:'https://images.unsplash.com/photo-1572569511254-d8f925fe2cbb?w=600',description:'True wireless earbuds with active noise cancellation',stock:25,featured:true},
                        {id:5,name:'CrystalSound Mini',category:'earbuds',price:129,image:'https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=600',description:'Compact earbuds with premium sound quality',stock:30,featured:false},
                        {id:6,name:'SportFit Pro',category:'earbuds',price:169,image:'https://images.unsplash.com/photo-1606841837239-c5a1a4a07af7?w=600',description:'Waterproof sports earbuds with secure fit',stock:18,featured:false},
                        {id:7,name:'UltraBook X1',category:'laptops',price:1299,image:'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600',description:'Professional ultrabook with 16GB RAM',stock:8,featured:true},
                        {id:8,name:'CreatorPro 15',category:'laptops',price:1599,image:'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=600',description:'High-performance laptop for content creators',stock:5,featured:false},
                        {id:9,name:'GamingBook Elite',category:'laptops',price:1899,image:'https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=600',description:'Gaming laptop with RTX 4070 graphics',stock:6,featured:false},
                        {id:10,name:'Sonic Mouse Pro',category:'mice',price:89,image:'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=600',description:'Wireless gaming mouse with 20000 DPI sensor',stock:30,featured:false},
                        {id:11,name:'VelocityX RGB',category:'mice',price:79,image:'https://images.unsplash.com/photo-1613141411244-0e4ac09bf7b1?w=600',description:'RGB gaming mouse with customizable buttons',stock:25,featured:true},
                        {id:12,name:'PrecisionPro Elite',category:'mice',price:99,image:'https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=600',description:'Ultra-light wireless gaming mouse',stock:22,featured:false}
                        ];

                        // Store Provider Component
                        const StoreProvider = ({children}) => {
            const [cart, setCart] = useState([]);
                        const [wishlist, setWishlist] = useState([]);
                        const [orders, setOrders] = useState([]);
                        const [products, setProducts] = useState(PRODUCTS_DATA);
                        const [currentPage, setCurrentPage] = useState('home');
                        const [selectedCategory, setSelectedCategory] = useState(null);
                        const [isCartOpen, setIsCartOpen] = useState(false);
                        const [isWishlistOpen, setIsWishlistOpen] = useState(false);
                        const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
                        const [isAdminMode, setIsAdminMode] = useState(false);

            const addToCart = (product) => {
                const existing = cart.find(item => item.id === product.id);
                        if (existing) {
                            setCart(cart.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item));
                } else {
                            setCart([...cart, { ...product, quantity: 1 }]);
                }
            };

            const removeFromCart = (productId) => setCart(cart.filter(item => item.id !== productId));
            
            const updateQuantity = (productId, quantity) => {
                if (quantity === 0) removeFromCart(productId);
                else setCart(cart.map(item => item.id === productId ? {...item, quantity} : item));
            };

            const addToWishlist = (product) => {
                if (!wishlist.find(item => item.id === product.id)) {
                            setWishlist([...wishlist, product]);
                }
            };

            const removeFromWishlist = (productId) => setWishlist(wishlist.filter(item => item.id !== productId));

            const placeOrder = (orderData) => {
                const newOrder = {
                            id: Date.now(),
                        items: [...cart],
                        total: cartTotal,
                        customerInfo: orderData,
                        date: new Date().toISOString(),
                        status: 'Processing'
                };
                        setOrders([...orders, newOrder]);
                        setCart([]);
                        return newOrder;
            };

            const navigateToCategory = (categoryId) => {
                            setSelectedCategory(categoryId);
                        setCurrentPage('category');
                        window.scrollTo({top: 0, behavior: 'smooth' });
            };

            const navigateToHome = () => {
                            setCurrentPage('home');
                        setSelectedCategory(null);
                        window.scrollTo({top: 0, behavior: 'smooth' });
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);

                        return (
                        <StoreContext.Provider value={{
                            cart, wishlist, orders, products, currentPage, selectedCategory,
                            isCartOpen, isWishlistOpen, isCheckoutOpen, isAdminMode,
                            setProducts, addToCart, removeFromCart, updateQuantity,
                            addToWishlist, removeFromWishlist, setIsCartOpen, setIsWishlistOpen,
                            setIsCheckoutOpen, setIsAdminMode, cartTotal, cartCount, placeOrder,
                            navigateToCategory, navigateToHome, setCurrentPage
                        }}>
                            {children}
                        </StoreContext.Provider>
                        );
        };

        // Navbar Component
        const Navbar = () => {
            const {navigateToHome, cartCount, wishlist, setIsCartOpen, setIsWishlistOpen, isAdminMode, setIsAdminMode, setCurrentPage} = useStore();
                        const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                        window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

                        return (
                        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'navbar-blur' : ''}`}>
                            <div className="max-w-7xl mx-auto px-6 py-4">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center space-x-12">
                                        <h1 className="text-2xl font-black tracking-tighter cursor-pointer glitch" onClick={navigateToHome}>
                                            NEXUS<span className="text-[var(--accent)]">.</span>
                                        </h1>
                                        <div className="hidden md:flex space-x-8 font-mono text-sm">
                                            <button onClick={navigateToHome} className="hover:text-[var(--accent)] transition-colors">HOME</button>
                                            <button onClick={() => setCurrentPage('all-products')} className="hover:text-[var(--accent)] transition-colors">ALL PRODUCTS</button>
                                            <button onClick={() => setCurrentPage('about')} className="hover:text-[var(--accent)] transition-colors">ABOUT</button>
                                        </div>
                                    </div>
                                    <div className="flex items-center space-x-6">
                                        <button onClick={() => setIsAdminMode(!isAdminMode)} className="px-4 py-2 text-xs font-mono border border-[var(--border)] hover:border-[var(--accent)] transition-colors rounded">
                                            {isAdminMode ? 'USER' : 'ADMIN'}
                                        </button>
                                        <button onClick={() => setIsWishlistOpen(true)} className="relative hover:text-[var(--accent)] transition-colors">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                            </svg>
                                            {wishlist.length > 0 && (
                                                <span className="absolute -top-2 -right-2 bg-[var(--accent-2)] text-[var(--primary)] text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">{wishlist.length}</span>
                                            )}
                                        </button>
                                        <button onClick={() => setIsCartOpen(true)} className="relative hover:text-[var(--accent)] transition-colors">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                                            </svg>
                                            {cartCount > 0 && (
                                                <span className="absolute -top-2 -right-2 bg-[var(--accent)] text-[var(--primary)] text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold badge-pulse">{cartCount}</span>
                                            )}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </nav>
                        );
        };

        // Hero Component
        const Hero = () => {
            const {navigateToCategory} = useStore();

            useEffect(() => {
                if (typeof gsap !== 'undefined') {
                            gsap.from('.hero-title', { y: 100, opacity: 0, duration: 1, delay: 0.5, ease: 'power3.out' });
                        gsap.from('.hero-subtitle', {y: 50, opacity: 0, duration: 1, delay: 0.7, ease: 'power3.out' });
                        gsap.from('.hero-cta', {y: 30, opacity: 0, duration: 1, delay: 0.9, ease: 'power3.out' });
                        gsap.from('.hero-image', {scale: 0.8, opacity: 0, duration: 1.2, delay: 0.6, ease: 'power3.out' });
                }
            }, []);

                        return (
                        <div className="min-h-screen flex items-center justify-center px-6 pt-20 relative overflow-hidden">
                            <div className="absolute inset-0 opacity-10">
                                <div className="absolute top-20 left-10 w-96 h-96 bg-[var(--accent)] rounded-full blur-[120px]"></div>
                                <div className="absolute bottom-20 right-10 w-96 h-96 bg-[var(--accent-2)] rounded-full blur-[120px]"></div>
                            </div>

                            <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center relative z-10">
                                <div>
                                    <div className="inline-block mb-6 px-4 py-2 border border-[var(--accent)] rounded-full">
                                        <span className="font-mono text-xs text-[var(--accent)]">NEW COLLECTION 2025</span>
                                    </div>
                                    <h1 className="hero-title text-6xl md:text-7xl lg:text-8xl font-black leading-none mb-6">
                                        FUTURE OF<br />
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-[var(--accent)] to-[var(--accent-2)]">TECH</span>
                                    </h1>
                                    <p className="hero-subtitle text-xl text-gray-400 mb-8 max-w-lg">
                                        Experience cutting-edge electronics designed for tomorrow. Premium quality, unmatched performance.
                                    </p>
                                    <div className="hero-cta flex flex-wrap gap-4">
                                        <button onClick={() => navigateToCategory('headphones')} className="btn-primary px-8 py-4 rounded-full font-mono text-sm">
                                            SHOP NOW
                                        </button>
                                        <button onClick={() => window.scrollTo({ top: window.innerHeight, behavior: 'smooth' })} className="btn-outline px-8 py-4 rounded-full font-mono text-sm">
                                            EXPLORE
                                        </button>
                                    </div>
                                    <div className="mt-12 flex items-center space-x-8 font-mono text-sm">
                                        <div><div className="text-3xl font-bold text-[var(--accent)]">12+</div><div className="text-gray-500">PRODUCTS</div></div>
                                        <div><div className="text-3xl font-bold text-[var(--accent)]">50K+</div><div className="text-gray-500">CUSTOMERS</div></div>
                                        <div><div className="text-3xl font-bold text-[var(--accent)]">4.9★</div><div className="text-gray-500">RATING</div></div>
                                    </div>
                                </div>
                                <div className="relative hero-image">
                                    <div className="aspect-square rounded-3xl overflow-hidden floating">
                                        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800" alt="Featured" className="w-full h-full object-cover" />
                                    </div>
                                </div>
                            </div>
                        </div>
                        );
        };

                        // Category Card Component
                        const CategoryCard = ({category}) => {
            const {navigateToCategory} = useStore();
                        const cardRef = useRef(null);

            useEffect(() => {
                if (typeof gsap !== 'undefined' && cardRef.current) {
                            gsap.fromTo(cardRef.current,
                                { opacity: 0, y: 50 },
                                {
                                    opacity: 1,
                                    y: 0,
                                    duration: 0.8,
                                    scrollTrigger: {
                                        trigger: cardRef.current,
                                        start: 'top 80%',
                                        end: 'bottom 20%',
                                        toggleActions: 'play none none reverse'
                                    }
                                }
                            );
                }
            }, []);

                        return (
                        <div
                            ref={cardRef}
                            onClick={() => navigateToCategory(category.id)}
                            className="category-card cursor-pointer bg-[#111] border-2 border-[var(--border)] rounded-3xl overflow-hidden group"
                        >
                            <div className="aspect-[4/3] overflow-hidden relative">
                                <img
                                    src={category.image}
                                    alt={category.name}
                                    className="category-image w-full h-full object-cover"
                                />
                                <div className="absolute inset-0 bg-gradient-to-t from-[#0A0A0A] via-transparent to-transparent opacity-60"></div>
                                <div className={`absolute top-4 right-4 px-4 py-2 rounded-full bg-gradient-to-r ${category.gradient} text-white font-bold text-sm`}>
                                    {category.count} Products
                                </div>
                            </div>
                            <div className="p-6">
                                <h3 className="text-2xl font-black mb-2 group-hover:text-[var(--accent)] transition-colors">
                                    {category.name}
                                </h3>
                                <p className="text-gray-400 text-sm mb-4">{category.description}</p>
                                <div className="flex items-center text-[var(--accent)] font-mono text-sm group-hover:translate-x-2 transition-transform">
                                    SHOP NOW
                                    <svg className="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                    </svg>
                                </div>
                            </div>
                        </div>
                        );
        };

        // Categories Section
        const CategoriesSection = () => {
            return (
                        <div className="px-6 py-20">
                            <div className="max-w-7xl mx-auto">
                                <div className="text-center mb-16">
                                    <h2 className="text-5xl md:text-6xl font-black mb-4">
                                        SHOP BY <span className="text-[var(--accent)]">CATEGORY</span>
                                    </h2>
                                    <p className="text-gray-400 text-lg max-w-2xl mx-auto">
                                        Explore our carefully curated collection of premium electronics
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {CATEGORIES.map(category => (
                                        <CategoryCard key={category.id} category={category} />
                                    ))}
                                </div>
                            </div>
                        </div>
                        );
        };

                        // Product Card Component
                        const ProductCard = ({product}) => {
            const {addToCart, addToWishlist, wishlist} = useStore();
            const isInWishlist = wishlist.some(item => item.id === product.id);
                        const cardRef = useRef(null);

            useEffect(() => {
                if (typeof gsap !== 'undefined' && cardRef.current) {
                            gsap.fromTo(cardRef.current,
                                { opacity: 0, y: 30 },
                                {
                                    opacity: 1,
                                    y: 0,
                                    duration: 0.6,
                                    scrollTrigger: {
                                        trigger: cardRef.current,
                                        start: 'top 85%',
                                        toggleActions: 'play none none reverse'
                                    }
                                }
                            );
                }
            }, []);

                        return (
                        <div ref={cardRef} className="product-card bg-[#111] border border-[var(--border)] rounded-2xl overflow-hidden">
                            <div className="aspect-square bg-[#1a1a1a] relative overflow-hidden">
                                <img src={product.image} alt={product.name} className="product-image w-full h-full object-cover" />
                                <button
                                    onClick={() => addToWishlist(product)}
                                    className="absolute top-4 right-4 w-10 h-10 rounded-full bg-[var(--primary)] border border-[var(--border)] flex items-center justify-center hover:border-[var(--accent-2)] transition-colors"
                                >
                                    <svg className={`w-5 h-5 ${isInWishlist ? 'fill-[var(--accent-2)] stroke-[var(--accent-2)]' : 'stroke-white'}`} fill="none" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                    </svg>
                                </button>
                                {product.stock < 10 && (
                                    <div className="absolute top-4 left-4 bg-[var(--accent-2)] text-[var(--primary)] px-3 py-1 rounded-full text-xs font-bold">
                                        LOW STOCK
                                    </div>
                                )}
                            </div>
                            <div className="p-6">
                                <h3 className="text-xl font-bold mb-2">{product.name}</h3>
                                <p className="text-sm text-gray-400 mb-4">{product.description}</p>
                                <div className="flex items-center justify-between">
                                    <div className="text-2xl font-bold text-[var(--accent)]">${product.price}</div>
                                    <button
                                        onClick={() => addToCart(product)}
                                        className="btn-primary px-6 py-3 rounded-full font-mono text-xs"
                                    >
                                        ADD TO CART
                                    </button>
                                </div>
                                <div className="mt-4 text-xs font-mono text-gray-500">{product.stock} units available</div>
                            </div>
                        </div>
                        );
        };

        // Category Page Component
        const CategoryPage = () => {
            const {selectedCategory, products, navigateToHome} = useStore();
            const category = CATEGORIES.find(c => c.id === selectedCategory);
            const categoryProducts = products.filter(p => p.category === selectedCategory);

            useEffect(() => {
                if (typeof gsap !== 'undefined') {
                            gsap.from('.category-header', { y: 50, opacity: 0, duration: 0.8, ease: 'power3.out' });
                }
            }, [selectedCategory]);

                        if (!category) return null;

                        return (
                        <div className="min-h-screen px-6 py-32">
                            <div className="max-w-7xl mx-auto">
                                <button
                                    onClick={navigateToHome}
                                    className="flex items-center text-gray-400 hover:text-[var(--accent)] transition-colors mb-8 font-mono text-sm"
                                >
                                    <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                                    </svg>
                                    BACK TO HOME
                                </button>

                                <div className="category-header mb-12">
                                    <h1 className="text-5xl md:text-6xl font-black mb-4">
                                        {category.name} <span className="text-[var(--accent)]">.</span>
                                    </h1>
                                    <p className="text-gray-400 text-lg">{category.description}</p>
                                    <div className="mt-6 inline-block px-6 py-3 bg-[#111] border border-[var(--border)] rounded-full font-mono text-sm">
                                        {categoryProducts.length} Products Available
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {categoryProducts.map(product => (
                                        <ProductCard key={product.id} product={product} />
                                    ))}
                                </div>
                            </div>
                        </div>
                        );
        };

        // All Products Page
        const AllProductsPage = () => {
            const {products} = useStore();
                        const [filter, setFilter] = useState('all');
                        const [sortBy, setSortBy] = useState('featured');

            const categories = ['all', ...new Set(CATEGORIES.map(c => c.id))];

                        const filteredProducts = products
                .filter(p => filter === 'all' || p.category === filter)
                .sort((a, b) => {
                    if (sortBy === 'price-low') return a.price - b.price;
                        if (sortBy === 'price-high') return b.price - a.price;
                        if (sortBy === 'featured') return b.featured - a.featured;
                        return 0;
                });

                        return (
                        <div className="min-h-screen px-6 py-32">
                            <div className="max-w-7xl mx-auto">
                                <div className="mb-12">
                                    <h2 className="text-5xl md:text-6xl font-black mb-4">
                                        ALL <span className="text-[var(--accent)]">PRODUCTS</span>
                                    </h2>
                                    <p className="text-gray-400 text-lg max-w-2xl">
                                        Browse our complete collection of premium electronics
                                    </p>
                                </div>

                                <div className="flex flex-wrap gap-4 mb-12">
                                    <div className="flex-1 min-w-[200px]">
                                        <label className="block font-mono text-xs text-gray-500 mb-2">CATEGORY</label>
                                        <select
                                            value={filter}
                                            onChange={(e) => setFilter(e.target.value)}
                                            className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3 outline-none"
                                        >
                                            {categories.map(cat => (
                                                <option key={cat} value={cat}>
                                                    {cat === 'all' ? 'ALL CATEGORIES' : CATEGORIES.find(c => c.id === cat)?.name.toUpperCase()}
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="flex-1 min-w-[200px]">
                                        <label className="block font-mono text-xs text-gray-500 mb-2">SORT BY</label>
                                        <select
                                            value={sortBy}
                                            onChange={(e) => setSortBy(e.target.value)}
                                            className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3 outline-none"
                                        >
                                            <option value="featured">FEATURED</option>
                                            <option value="price-low">PRICE: LOW TO HIGH</option>
                                            <option value="price-high">PRICE: HIGH TO LOW</option>
                                        </select>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {filteredProducts.map(product => (
                                        <ProductCard key={product.id} product={product} />
                                    ))}
                                </div>
                            </div>
                        </div>
                        );
        };

        // Cart Sidebar (simplified for brevity - keeping existing implementation)
        const CartSidebar = () => {
            const {cart, isCartOpen, setIsCartOpen, updateQuantity, removeFromCart, cartTotal, setIsCheckoutOpen} = useStore();
                        if (!isCartOpen) return null;

                        return (
                        <>
                            <div className="fixed inset-0 modal-backdrop z-50" onClick={() => setIsCartOpen(false)}></div>
                            <div className="fixed top-0 right-0 w-full md:w-[500px] h-full bg-[var(--primary)] border-l border-[var(--border)] z-50 overflow-y-auto hide-scrollbar">
                                <div className="p-6">
                                    <div className="flex items-center justify-between mb-8">
                                        <h2 className="text-2xl font-bold">CART <span className="text-[var(--accent)]">({cart.length})</span></h2>
                                        <button onClick={() => setIsCartOpen(false)} className="w-10 h-10 rounded-full border border-[var(--border)] hover:border-[var(--accent)] transition-colors flex items-center justify-center">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                            </svg>
                                        </button>
                                    </div>

                                    {cart.length === 0 ? (
                                        <div className="text-center py-20">
                                            <svg className="w-24 h-24 mx-auto mb-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                                            </svg>
                                            <p className="text-gray-500 font-mono">Your cart is empty</p>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="space-y-6 mb-6">
                                                {cart.map(item => (
                                                    <div key={item.id} className="flex gap-4 p-4 bg-[#111] rounded-xl border border-[var(--border)]">
                                                        <img src={item.image} alt={item.name} className="w-24 h-24 object-cover rounded-lg" />
                                                        <div className="flex-1">
                                                            <h3 className="font-bold mb-1">{item.name}</h3>
                                                            <p className="text-sm text-gray-500 mb-2">${item.price}</p>
                                                            <div className="flex items-center gap-2">
                                                                <button onClick={() => updateQuantity(item.id, item.quantity - 1)} className="w-8 h-8 rounded-lg border border-[var(--border)] hover:border-[var(--accent)] flex items-center justify-center">-</button>
                                                                <span className="w-12 text-center font-mono">{item.quantity}</span>
                                                                <button onClick={() => updateQuantity(item.id, item.quantity + 1)} className="w-8 h-8 rounded-lg border border-[var(--border)] hover:border-[var(--accent)] flex items-center justify-center">+</button>
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col items-end justify-between">
                                                            <button onClick={() => removeFromCart(item.id)} className="text-gray-500 hover:text-[var(--accent-2)]">
                                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                                                </svg>
                                                            </button>
                                                            <div className="font-bold text-[var(--accent)]">${(item.price * item.quantity).toFixed(2)}</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="border-t border-[var(--border)] pt-6 space-y-4">
                                                <div className="flex justify-between text-sm">
                                                    <span className="text-gray-500">Subtotal</span>
                                                    <span className="font-mono">${cartTotal.toFixed(2)}</span>
                                                </div>
                                                <div className="flex justify-between text-sm">
                                                    <span className="text-gray-500">Shipping</span>
                                                    <span className="font-mono text-[var(--accent)]">FREE</span>
                                                </div>
                                                <div className="flex justify-between text-xl font-bold border-t border-[var(--border)] pt-4">
                                                    <span>Total</span>
                                                    <span className="text-[var(--accent)]">${cartTotal.toFixed(2)}</span>
                                                </div>
                                                <button onClick={() => setIsCheckoutOpen(true)} className="w-full btn-primary py-4 rounded-full font-bold">
                                                    PROCEED TO CHECKOUT
                                                </button>
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        </>
                        );
        };

        // Wishlist Sidebar (simplified)
        const WishlistSidebar = () => {
            const {wishlist, isWishlistOpen, setIsWishlistOpen, removeFromWishlist, addToCart} = useStore();
                        if (!isWishlistOpen) return null;

                        return (
                        <>
                            <div className="fixed inset-0 modal-backdrop z-50" onClick={() => setIsWishlistOpen(false)}></div>
                            <div className="fixed top-0 right-0 w-full md:w-[500px] h-full bg-[var(--primary)] border-l border-[var(--border)] z-50 overflow-y-auto hide-scrollbar">
                                <div className="p-6">
                                    <div className="flex items-center justify-between mb-8">
                                        <h2 className="text-2xl font-bold">WISHLIST <span className="text-[var(--accent)]">({wishlist.length})</span></h2>
                                        <button onClick={() => setIsWishlistOpen(false)} className="w-10 h-10 rounded-full border border-[var(--border)] hover:border-[var(--accent)] transition-colors flex items-center justify-center">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                            </svg>
                                        </button>
                                    </div>

                                    {wishlist.length === 0 ? (
                                        <div className="text-center py-20">
                                            <svg className="w-24 h-24 mx-auto mb-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                            </svg>
                                            <p className="text-gray-500 font-mono">Your wishlist is empty</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            {wishlist.map(item => (
                                                <div key={item.id} className="flex gap-4 p-4 bg-[#111] rounded-xl border border-[var(--border)]">
                                                    <img src={item.image} alt={item.name} className="w-24 h-24 object-cover rounded-lg" />
                                                    <div className="flex-1">
                                                        <h3 className="font-bold mb-1">{item.name}</h3>
                                                        <p className="text-sm text-gray-500 mb-2">{CATEGORIES.find(c => c.id === item.category)?.name}</p>
                                                        <div className="text-lg font-bold text-[var(--accent)] mb-3">${item.price}</div>
                                                        <button
                                                            onClick={() => { addToCart(item); removeFromWishlist(item.id); }}
                                                            className="btn-primary px-4 py-2 rounded-full text-xs font-mono"
                                                        >
                                                            ADD TO CART
                                                        </button>
                                                    </div>
                                                    <button onClick={() => removeFromWishlist(item.id)} className="text-gray-500 hover:text-[var(--accent-2)]">
                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                                        </svg>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </>
                        );
        };

        // Checkout Modal (simplified - keeping core functionality)
        const CheckoutModal = () => {
            const {cart, isCheckoutOpen, setIsCheckoutOpen, cartTotal, placeOrder, setIsCartOpen} = useStore();
                        const [step, setStep] = useState(1);
                        const [orderComplete, setOrderComplete] = useState(false);
                        const [formData, setFormData] = useState({
                            fullName: '', email: '', phone: '', address: '', city: '', state: '', zipCode: '', country: '',
                        cardNumber: '', cardName: '', expiryDate: '', cvv: ''
            });

                        if (!isCheckoutOpen) return null;

            const handleInputChange = (e) => setFormData({...formData, [e.target.name]: e.target.value });

            const handleSubmit = (e) => {
                            e.preventDefault();
                        if (step < 3) {
                            setStep(step + 1);
                } else {
                            placeOrder(formData);
                        setOrderComplete(true);
                    setTimeout(() => {
                            setIsCheckoutOpen(false);
                        setIsCartOpen(false);
                        setOrderComplete(false);
                        setStep(1);
                        setFormData({fullName: '', email: '', phone: '', address: '', city: '', state: '', zipCode: '', country: '', cardNumber: '', cardName: '', expiryDate: '', cvv: '' });
                    }, 3000);
                }
            };

                        if (orderComplete) {
                return (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center">
                            <div className="modal-backdrop absolute inset-0"></div>
                            <div className="relative bg-[var(--primary)] border-2 border-[var(--accent)] rounded-3xl p-12 max-w-md text-center">
                                <svg className="w-24 h-24 mx-auto mb-6" viewBox="0 0 100 100">
                                    <circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" strokeWidth="4" />
                                    <path className="checkmark" fill="none" stroke="var(--accent)" strokeWidth="4" strokeLinecap="round" d="M30 50 L45 65 L70 35" />
                                </svg>
                                <h2 className="text-3xl font-black mb-4">ORDER PLACED!</h2>
                                <p className="text-gray-400 mb-2">Your order has been successfully placed.</p>
                                <p className="text-sm text-gray-500">Order ID: #{Date.now()}</p>
                            </div>
                        </div>
                        );
            }

                        return (
                        <>
                            <div className="fixed inset-0 modal-backdrop z-[60]" onClick={() => setIsCheckoutOpen(false)}></div>
                            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4">
                                <div className="relative bg-[var(--primary)] border border-[var(--border)] rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-y-auto hide-scrollbar p-8">
                                    <div className="flex items-center justify-between mb-8">
                                        <h2 className="text-2xl font-black">CHECKOUT</h2>
                                        <button onClick={() => setIsCheckoutOpen(false)} className="w-10 h-10 rounded-full border border-[var(--border)] hover:border-[var(--accent)] transition-colors flex items-center justify-center">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                            </svg>
                                        </button>
                                    </div>

                                    <div className="flex items-center justify-between mb-8">
                                        {[1, 2, 3].map(num => (
                                            <React.Fragment key={num}>
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold ${step >= num ? 'bg-[var(--accent)] text-[var(--primary)]' : 'bg-[#111] border border-[var(--border)]'}`}>{num}</div>
                                                {num < 3 && <div className={`flex-1 h-1 mx-2 ${step > num ? 'bg-[var(--accent)]' : 'bg-[#111]'}`}></div>}
                                            </React.Fragment>
                                        ))}
                                    </div>

                                    <form onSubmit={handleSubmit}>
                                        {step === 1 && (
                                            <div className="space-y-4">
                                                <h3 className="text-xl font-bold mb-4">Shipping Information</h3>
                                                <input type="text" name="fullName" placeholder="Full Name" value={formData.fullName} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                <div className="grid md:grid-cols-2 gap-4">
                                                    <input type="email" name="email" placeholder="Email" value={formData.email} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                    <input type="tel" name="phone" placeholder="Phone" value={formData.phone} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                </div>
                                                <input type="text" name="address" placeholder="Address" value={formData.address} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                <div className="grid md:grid-cols-2 gap-4">
                                                    <input type="text" name="city" placeholder="City" value={formData.city} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                    <input type="text" name="state" placeholder="State" value={formData.state} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                </div>
                                                <div className="grid md:grid-cols-2 gap-4">
                                                    <input type="text" name="zipCode" placeholder="ZIP Code" value={formData.zipCode} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                    <input type="text" name="country" placeholder="Country" value={formData.country} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                </div>
                                            </div>
                                        )}

                                        {step === 2 && (
                                            <div>
                                                <h3 className="text-xl font-bold mb-4">Shipping Method</h3>
                                                <label className="flex items-center justify-between p-4 bg-[#111] border-2 border-[var(--accent)] rounded-lg mb-4">
                                                    <div className="flex items-center gap-4">
                                                        <input type="radio" name="shipping" defaultChecked className="w-5 h-5" />
                                                        <div><div className="font-bold">Standard Shipping</div><div className="text-sm text-gray-500">5-7 business days</div></div>
                                                    </div>
                                                    <div className="font-bold text-[var(--accent)]">FREE</div>
                                                </label>
                                            </div>
                                        )}

                                        {step === 3 && (
                                            <div className="space-y-4">
                                                <h3 className="text-xl font-bold mb-4">Payment Information</h3>
                                                <input type="text" name="cardNumber" placeholder="Card Number" value={formData.cardNumber} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                <input type="text" name="cardName" placeholder="Cardholder Name" value={formData.cardName} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                <div className="grid md:grid-cols-2 gap-4">
                                                    <input type="text" name="expiryDate" placeholder="MM/YY" value={formData.expiryDate} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                    <input type="text" name="cvv" placeholder="CVV" value={formData.cvv} onChange={handleInputChange} className="w-full bg-[#111] border border-[var(--border)] rounded-lg px-4 py-3" required />
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex gap-4 mt-8">
                                            {step > 1 && <button type="button" onClick={() => setStep(step - 1)} className="flex-1 btn-outline py-4 rounded-full font-mono text-sm">BACK</button>}
                                            <button type="submit" className="flex-1 btn-primary py-4 rounded-full font-mono text-sm">{step === 3 ? 'PLACE ORDER' : 'CONTINUE'}</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </>
                        );
        };

        // Admin Panel (simplified)
        const AdminPanel = () => {
            const {products, setProducts, orders} = useStore();
                        const [activeTab, setActiveTab] = useState('products');

                        return (
                        <div className="min-h-screen px-6 py-32">
                            <div className="max-w-7xl mx-auto">
                                <h2 className="text-5xl font-black mb-12">ADMIN <span className="text-[var(--accent)]">PORTAL</span></h2>
                                <div className="flex gap-4 mb-8 border-b border-[var(--border)]">
                                    <button onClick={() => setActiveTab('products')} className={`px-6 py-3 font-mono text-sm ${activeTab === 'products' ? 'border-b-2 border-[var(--accent)] text-[var(--accent)]' : 'text-gray-500'}`}>PRODUCTS</button>
                                    <button onClick={() => setActiveTab('orders')} className={`px-6 py-3 font-mono text-sm ${activeTab === 'orders' ? 'border-b-2 border-[var(--accent)] text-[var(--accent)]' : 'text-gray-500'}`}>ORDERS ({orders.length})</button>
                                </div>
                                <div className="bg-[#111] border border-[var(--border)] rounded-2xl p-6">
                                    <p className="text-gray-400">Admin panel - Product and order management interface</p>
                                </div>
                            </div>
                        </div>
                        );
        };

        // About Page
        const About = () => (
                        <div className="min-h-screen px-6 py-32">
                            <div className="max-w-4xl mx-auto">
                                <h2 className="text-5xl md:text-6xl font-black mb-8">ABOUT <span className="text-[var(--accent)]">NEXUS</span></h2>
                                <div className="space-y-6 text-lg text-gray-400">
                                    <p>We're not just another electronics store. We're curators of innovation, bringing you the most cutting-edge technology.</p>
                                    <p>Founded in 2020, NEXUS has become the go-to destination for tech enthusiasts who demand more from their devices.</p>
                                    <p>Our mission is simple: democratize access to premium technology and make the future available today.</p>
                                </div>
                            </div>
                        </div>
                        );

        // Marquee
        const Marquee = () => (
                        <div className="border-y border-[var(--border)] py-6 overflow-hidden bg-[#111]">
                            <div className="flex whitespace-nowrap">
                                {[...Array(2)].map((_, i) => (
                                    <div key={i} className="marquee flex items-center space-x-12 font-mono text-sm">
                                        {['FREE SHIPPING', '30-DAY RETURNS', '2-YEAR WARRANTY', '24/7 SUPPORT', 'SECURE CHECKOUT'].map((text, j) => (
                                            <span key={j}>★ {text}</span>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </div>
                        );

        // Footer
        const Footer = () => (
                        <footer className="border-t border-[var(--border)] py-12 px-6 mt-20">
                            <div className="max-w-7xl mx-auto">
                                <div className="grid md:grid-cols-4 gap-8 mb-12">
                                    <div><h3 className="text-2xl font-black mb-4">NEXUS<span className="text-[var(--accent)]">.</span></h3><p className="text-sm text-gray-500">Premium electronics for the modern world.</p></div>
                                    <div><h4 className="font-bold mb-4">SHOP</h4><div className="space-y-2 text-sm text-gray-500">{['All Products', 'New Arrivals', 'Best Sellers'].map((item, i) => <div key={i} className="hover:text-[var(--accent)] cursor-pointer">{item}</div>)}</div></div>
                                    <div><h4 className="font-bold mb-4">SUPPORT</h4><div className="space-y-2 text-sm text-gray-500">{['Contact', 'Shipping', 'Returns'].map((item, i) => <div key={i} className="hover:text-[var(--accent)] cursor-pointer">{item}</div>)}</div></div>
                                    <div><h4 className="font-bold mb-4">FOLLOW</h4><div className="flex gap-4">{['IG', 'TW', 'FB'].map((s, i) => <div key={i} className="w-10 h-10 rounded-full border border-[var(--border)] hover:border-[var(--accent)] flex items-center justify-center cursor-pointer">{s}</div>)}</div></div>
                                </div>
                                <div className="border-t border-[var(--border)] pt-8 text-center text-sm text-gray-500 font-mono">© 2025 NEXUS. ALL RIGHTS RESERVED.</div>
                            </div>
                        </footer>
                        );

        // Main App Component
        const App = () => {
            const {currentPage, isAdminMode} = useStore();

            useEffect(() => {
                const updateScrollProgress = () => {
                    const scrollProgress = document.getElementById('scrollProgress');
                        const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
                        if (scrollProgress) scrollProgress.style.width = `${scrolled}%`;
                };
                        window.addEventListener('scroll', updateScrollProgress);
                return () => window.removeEventListener('scroll', updateScrollProgress);
            }, []);

                        return (
                        <div>
                            <Navbar />

                            {isAdminMode ? (
                                <AdminPanel />
                            ) : (
                                <>
                                    {currentPage === 'home' && (
                                        <>
                                            <Hero />
                                            <Marquee />
                                            <CategoriesSection />
                                        </>
                                    )}
                                    {currentPage === 'category' && <CategoryPage />}
                                    {currentPage === 'all-products' && <AllProductsPage />}
                                    {currentPage === 'about' && <About />}
                                </>
                            )}

                            <Footer />
                            <CartSidebar />
                            <WishlistSidebar />
                            <CheckoutModal />
                        </div>
                        );
        };

                        // Initialize App
                        const root = ReactDOM.createRoot(document.getElementById('root'));
                        root.render(<StoreProvider><App /></StoreProvider>);
                    </script>
                </body>
            </html>
